x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    TZ: Asia/Shanghai
  ports:
    - "8080:8080"

services:
  app:
    <<: *app-base
    depends_on:
      - postgres
      - minio

  app-mysql:
    <<: *app-base
    profiles: ["mysql"]
    environment:
      TZ: Asia/Shanghai
      DB_DRIVER: mysql
      DB_DSN: prototype:prototype@tcp(mysql:3306)/prototype_hub?charset=utf8mb4&parseTime=True&loc=Local
    depends_on:
      - mysql
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: prototype_hub
      POSTGRES_USER: prototype
      POSTGRES_PASSWORD: prototype
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    command: --default-authentication-plugin=mysql_native_password
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: prototype_hub
      MYSQL_USER: prototype
      MYSQL_PASSWORD: prototype
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres-data:
  mysql-data:
  minio-data:
